<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FMS Workspace</title>
  <style>
    :root{
      --bg:#b5dbe3;
      --navy:#071c7b;
      --navy-2:#1636a2;
      --navy-3:#274fc6;
      --sky:#42aae7;
      --sky-2:#97e8ff;
      --panel:#eaf4ff66;
      --panel-solid:#e9f2ff;
      --panel-2:#dceafe;
      --line:#bfd6fb;
      --text:#1c3d79;
      --muted:#6b87b7;
      --soft:#f6fbff;
      --shadow:0 28px 70px rgba(28,61,121,.2);
      --shadow-soft:0 10px 30px rgba(39,79,198,.12);
      --radius:28px;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;background:linear-gradient(180deg,#a8d0ed 0%,#9dc5ee 42%,#90b8ea 100%);color:var(--text);overflow:hidden}
    button,input,select{font:inherit}
    .page{position:relative;min-height:100vh;padding:38px}
    .bg-blob,.bg-blob2,.bg-blob3{position:absolute;border-radius:50%;pointer-events:none}
    .bg-blob{width:560px;height:560px;right:-180px;top:-180px;background:radial-gradient(circle at 40% 45%, rgba(151,232,255,.82), rgba(66,170,231,.46) 42%, rgba(163,208,237,0) 70%)}
    .bg-blob2{width:520px;height:520px;left:-170px;bottom:-180px;background:radial-gradient(circle at 50% 50%, rgba(66,170,231,.34), rgba(39,79,198,.06) 70%)}
    .bg-blob3{width:360px;height:360px;right:90px;bottom:-90px;background:radial-gradient(circle at 50% 50%, rgba(151,232,255,.2), rgba(255,255,255,0) 72%)}
    .shell{position:relative;z-index:2;height:calc(100vh - 76px);display:grid;grid-template-columns:240px 1fr;background:linear-gradient(145deg, rgba(15,31,122,.86), rgba(83,149,234,.38) 19%, rgba(240,248,255,.5) 41%, rgba(187,220,255,.72) 100%);border-radius:32px;box-shadow:var(--shadow);overflow:hidden}
    .sidebar{background:linear-gradient(180deg, rgba(4,20,118,.97), rgba(37,83,204,.95) 63%, rgba(97,176,245,.72));color:white;display:flex;flex-direction:column;position:relative}
    .logo{padding:34px 34px 28px;font-size:32px;font-weight:800;letter-spacing:.02em}
    .side-group{padding:0 0 10px}
    .nav-item,.sub-item{border:0;background:transparent;color:rgba(255,255,255,.92);width:100%;text-align:left;display:flex;align-items:center;gap:14px;cursor:pointer}
    .nav-item{padding:18px 32px;font-size:18px;position:relative}
    .nav-item.active{background:linear-gradient(90deg, rgba(255,255,255,.14), rgba(255,255,255,.04));box-shadow:inset 0 1px 0 rgba(255,255,255,.15), inset 0 -1px 0 rgba(255,255,255,.08)}
    .nav-item .dot{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;background:rgba(255,255,255,.12);font-size:15px;flex:0 0 auto}
    .sub-list{padding:8px 22px 4px 62px;display:grid;gap:8px}
    .sub-item{padding:6px 0 6px 18px;font-size:16px;opacity:.84;position:relative}
    .sub-item:before{content:'•';position:absolute;left:0;top:5px;color:rgba(255,255,255,.75)}
    .sub-item.active{opacity:1;color:white;font-weight:700}
    .sub-item.active:after{content:'›';position:absolute;right:0;color:#a6f0ff}
    .main{display:grid;grid-template-rows:90px 1fr}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:linear-gradient(180deg, rgba(118,175,241,.55), rgba(118,175,241,.3));border-bottom:1px solid rgba(255,255,255,.28)}
    .top-tabs{display:flex;gap:14px;align-items:center}
    .top-tab{border:0;background:rgba(255,255,255,.16);color:white;padding:16px 30px;border-radius:18px;font-size:18px;cursor:pointer;min-width:110px}
    .top-tab.active{background:linear-gradient(180deg, rgba(255,255,255,.74), rgba(214,233,255,.72));color:var(--text);font-weight:800;box-shadow:var(--shadow-soft)}
    .top-actions{display:flex;align-items:center;gap:14px}
    .user-chip,.icon-btn{border:0;border-radius:18px;background:linear-gradient(180deg, rgba(255,255,255,.82), rgba(226,238,255,.92));color:var(--text);padding:14px 20px;font-weight:800;cursor:pointer;box-shadow:var(--shadow-soft)}
    .icon-btn{width:54px;height:54px;padding:0;border-radius:50%}
    .content{padding:28px 34px 34px;overflow:auto;position:relative}
    .section-tabs{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:22px}
    .section-links{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
    .section-link{background:none;border:0;color:#4675bf;font-size:24px;padding:0 4px 10px;cursor:pointer}
    .section-link.active{color:var(--text);font-weight:800;border-bottom:4px solid #2257c9}
    .action-row{display:flex;gap:12px;flex-wrap:wrap}
    .dropdown,.cta{border:0;border-radius:16px;padding:14px 18px;background:linear-gradient(180deg, rgba(255,255,255,.82), rgba(225,238,255,.98));color:#2e569d;font-weight:800;box-shadow:var(--shadow-soft)}
    .cta{background:linear-gradient(135deg, #2754cb, #3574e6);color:white}
    .panel{background:linear-gradient(180deg, rgba(255,255,255,.35), rgba(226,237,255,.48));border:1px solid rgba(255,255,255,.34);border-radius:24px;padding:18px 18px 20px;box-shadow:var(--shadow-soft)}
    .searchbar{display:grid;grid-template-columns:1fr 180px 140px;gap:14px;align-items:center}
    .search-input,.light-select{border:1px solid rgba(191,214,251,.95);background:rgba(247,252,255,.78);border-radius:18px;padding:16px 18px;color:#5b80bb;outline:none;font-size:18px}
    .chips{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
    .chip{border:1px solid rgba(191,214,251,1);background:rgba(249,252,255,.82);border-radius:14px;padding:13px 16px;color:#486eaa;font-weight:700;cursor:pointer}
    .chip.active{background:linear-gradient(135deg, rgba(122,174,245,.95), rgba(194,222,255,.92));color:white;box-shadow:var(--shadow-soft)}
    .meta{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 6px 14px;color:#4b6faa;font-size:15px}
    .pager-dots{display:flex;gap:10px;align-items:center}
    .pager-dots span{width:11px;height:11px;border-radius:50%;background:rgba(102,143,204,.35)}
    .pager-dots span.active{background:white;box-shadow:0 0 0 3px rgba(255,255,255,.25)}
    .table-card{border-radius:24px;overflow:hidden;background:linear-gradient(180deg, rgba(255,255,255,.56), rgba(225,237,255,.84));border:1px solid rgba(255,255,255,.42);box-shadow:var(--shadow-soft)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:18px 22px;text-align:left}
    thead th{font-size:14px;letter-spacing:.04em;color:#2d508f;background:rgba(255,255,255,.3)}
    tbody td{font-size:17px;color:#294b85;border-top:1px solid rgba(191,214,251,.52)}
    tbody tr:hover{background:rgba(255,255,255,.25)}
    .status-pill{display:inline-flex;align-items:center;justify-content:center;padding:9px 16px;border-radius:12px;font-weight:800;min-width:120px}
    .status-blue{background:#67abf8;color:white}.status-cyan{background:#7dcfe6;color:white}.status-green{background:#63b5b5;color:white}.status-amber{background:#dfd0ab;color:#6d5622}
    .view{display:none}.view.active{display:block}
    .results-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
    .summary-card{padding:20px;border-radius:22px;background:linear-gradient(180deg, rgba(255,255,255,.48), rgba(226,237,255,.7));border:1px solid rgba(255,255,255,.36)}
    .summary-card h3{margin:0 0 14px;font-size:20px}
    .kv{display:grid;grid-template-columns:160px 1fr;gap:10px 14px}
    .kv div:nth-child(odd){font-weight:800;color:#31548f}
    .log{min-height:340px;max-height:520px;overflow:auto;white-space:pre-wrap;background:rgba(245,251,255,.76);border-radius:18px;padding:16px;color:#35558d;border:1px solid rgba(191,214,251,.62)}
    .hidden{display:none!important}
    .muted{color:var(--muted)}
    @media (max-width:1280px){.searchbar{grid-template-columns:1fr}.results-grid{grid-template-columns:1fr}.shell{grid-template-columns:210px 1fr}}
    @media (max-width:980px){body{overflow:auto}.page{padding:18px}.shell{height:auto;grid-template-columns:1fr}.sidebar{display:none}.main{grid-template-rows:auto 1fr}.topbar{padding:18px 20px;flex-direction:column;align-items:flex-start}.content{padding:20px}.top-tabs{flex-wrap:wrap}}
  </style>
</head>
<body>
  <div class="page">
    <div class="bg-blob"></div><div class="bg-blob2"></div><div class="bg-blob3"></div>
    <div class="shell">
      <aside class="sidebar">
        <div class="logo">Your Logo</div>
        <div class="side-group">
          <button class="nav-item" data-view="home"><span class="dot">⌂</span><span>Home</span></button>
          <button class="nav-item active" data-view="orders"><span class="dot">▣</span><span>Orders</span></button>
          <div class="sub-list" id="orderSidebarList"></div>
          <button class="nav-item" data-view="trips"><span class="dot">⇄</span><span>Trips</span></button>
          <div class="sub-list hidden" id="tripSidebarList"></div>
          <button class="nav-item" data-view="linehaul"><span class="dot">↺</span><span>Linehaul</span></button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="top-tabs">
            <button class="top-tab" data-view="home">Home</button>
            <button class="top-tab active" data-view="orders">Orders</button>
            <button class="top-tab" data-view="trips">Trips</button>
            <button class="top-tab" data-view="linehaul">Linhaul</button>
            <button class="top-tab" data-view="results">Results</button>
          </div>
          <div class="top-actions">
            <button class="user-chip" id="sessionChip">Admin User ▾</button>
            <button class="icon-btn" id="logoutBtn">◉</button>
          </div>
        </header>

        <section class="content">
          <section class="view" id="view-home">
            <div class="section-tabs">
              <div class="section-links">
                <button class="section-link active">Home</button>
              </div>
              <div class="action-row">
                <button class="dropdown" id="homeResolveBtn">Resolve Keyword</button>
                <button class="cta" id="openWorkspaceBtn">Open Full View</button>
              </div>
            </div>
            <div class="panel">
              <div class="searchbar">
                <input class="search-input" id="globalKeyword" placeholder="Search for Pro#/Tracking#、DO#、Trip#、LH# Only" />
                <select class="light-select" id="globalTarget"><option value="auto">Auto Route</option><option value="orders">Orders</option><option value="trips">Trips</option><option value="linehaul">Linehaul</option></select>
                <button class="cta" id="homeFindBtn">Search</button>
              </div>
              <div class="chips" id="homeQuickChips"></div>
            </div>
            <div class="results-grid" style="margin-top:18px;">
              <div class="summary-card">
                <h3>Session & Routing</h3>
                <div class="kv" id="homeSummary"></div>
              </div>
              <div class="summary-card">
                <h3>Recent Activity</h3>
                <div class="log" id="activityLog"></div>
              </div>
            </div>
          </section>

          <section class="view active" id="view-orders">
            <div class="section-tabs">
              <div class="section-links">
                <button class="section-link">Home</button>
                <button class="section-link active">Orders</button>
                <button class="section-link">Trips</button>
                <button class="section-link">Linehaul</button>
                <button class="section-link" data-view="results">Results</button>
              </div>
              <div class="action-row">
                <select class="dropdown" id="orderActionSelect"></select>
                <select class="dropdown" id="tripActionTopSelect"></select>
                <button class="cta" id="orderRunBtn">+ Run Action</button>
              </div>
            </div>
            <div class="panel">
              <div class="searchbar">
                <input class="search-input" id="orderNoInput" placeholder="Search orders..." />
                <select class="light-select" id="orderSort"><option value="recent">Sort By Recent</option><option value="status">Sort By Status</option><option value="name">Sort By Name</option></select>
                <button class="cta" id="orderSearchBtn">+ Add Order</button>
              </div>
              <div class="chips" id="orderActionChips"></div>
            </div>
            <div class="meta"><span id="orderMetaLabel">Showing 0 results</span><div class="pager-dots"><span></span><span></span><span></span><span class="active"></span><span></span><span></span><span></span></div></div>
            <div class="table-card">
              <table>
                <thead><tr id="ordersHead"></tr></thead>
                <tbody id="ordersBody"></tbody>
              </table>
            </div>
          </section>

          <section class="view" id="view-trips">
            <div class="section-tabs">
              <div class="section-links">
                <button class="section-link">Home</button>
                <button class="section-link">Orders</button>
                <button class="section-link active">Trips</button>
                <button class="section-link">Linehaul</button>
                <button class="section-link" data-view="results">Results</button>
              </div>
              <div class="action-row">
                <select class="dropdown" id="tripActionSelect"></select>
                <button class="cta" id="tripRunBtn">+ Run Trip Action</button>
              </div>
            </div>
            <div class="panel">
              <div class="searchbar">
                <input class="search-input" id="tripNoInput" placeholder="Search trips..." />
                <select class="light-select" id="tripSort"><option value="recent">Sort By Recent</option><option value="stops">Sort By Stops</option><option value="tasks">Sort By Tasks</option></select>
                <button class="cta" id="tripSearchBtn">+ Add Trip</button>
              </div>
              <div class="chips" id="tripActionChips"></div>
            </div>
            <div class="meta"><span id="tripMetaLabel">Showing 0 results</span><div class="pager-dots"><span></span><span class="active"></span><span></span><span></span><span></span></div></div>
            <div class="table-card"><table><thead><tr id="tripsHead"></tr></thead><tbody id="tripsBody"></tbody></table></div>
          </section>

          <section class="view" id="view-linehaul">
            <div class="section-tabs">
              <div class="section-links">
                <button class="section-link">Home</button>
                <button class="section-link">Orders</button>
                <button class="section-link">Trips</button>
                <button class="section-link active">Linehaul</button>
                <button class="section-link" data-view="results">Results</button>
              </div>
              <div class="action-row"><button class="cta" id="linehaulRunBtn">+ Lookup Linehaul</button></div>
            </div>
            <div class="panel">
              <div class="searchbar">
                <input class="search-input" id="linehaulNosInput" placeholder="Enter linehaul numbers separated by commas" />
                <select class="light-select" id="linehaulSort"><option value="recent">Sort By Recent</option><option value="number">Sort By Number</option></select>
                <button class="cta" id="linehaulSearchBtn">Run Lookup</button>
              </div>
              <div class="chips" id="linehaulInfoChips"></div>
            </div>
            <div class="meta"><span id="linehaulMetaLabel">Showing 0 results</span><div class="pager-dots"><span></span><span></span><span class="active"></span></div></div>
            <div class="table-card"><table><thead><tr id="linehaulHead"></tr></thead><tbody id="linehaulBody"></tbody></table></div>
          </section>

          <section class="view" id="view-results">
            <div class="section-tabs">
              <div class="section-links"><button class="section-link active">Results</button></div>
              <div class="action-row"><button class="dropdown" id="copyResultsBtn">Copy JSON</button></div>
            </div>
            <div class="results-grid">
              <div class="summary-card"><h3>Structured Summary</h3><div class="kv" id="resultSummary"></div></div>
              <div class="summary-card"><h3>Raw Response</h3><div class="log" id="rawResponse"></div></div>
            </div>
          </section>
        </section>
      </main>
    </div>
  </div>

  <script>
    const orderActions = [
      ['billing', 'Billing'],
      ['consignee', 'Consignee'],
      ['detail', 'Detail'],
      ['files', 'Files'],
      ['estimate', 'Estimate'],
      ['basic', 'Basic'],
      ['history', 'History'],
      ['actual', 'Actual Freight'],
      ['shipper', 'Shipper'],
      ['status', 'Status'],
      ['tasks', 'Tasks']
    ];
    const tripActions = [
      ['detail', 'Detail'],
      ['files', 'Files'],
      ['history', 'History'],
      ['stops', 'Stops'],
      ['tasks', 'Tasks']
    ];

    const state = {
      session: null,
      view: 'orders',
      selectedOrderAction: 'billing',
      selectedTripAction: 'detail',
      selectedOrderNo: '',
      selectedTripNo: '',
      selectedLinehaulNos: '',
      lastResponse: null,
      log: ['Workspace ready.'],
      orderRows: [],
      tripRows: [],
      linehaulRows: []
    };

    const els = {
      sessionChip: document.getElementById('sessionChip'),
      activityLog: document.getElementById('activityLog'),
      homeSummary: document.getElementById('homeSummary'),
      resultSummary: document.getElementById('resultSummary'),
      rawResponse: document.getElementById('rawResponse'),
      ordersHead: document.getElementById('ordersHead'),
      ordersBody: document.getElementById('ordersBody'),
      tripsHead: document.getElementById('tripsHead'),
      tripsBody: document.getElementById('tripsBody'),
      linehaulHead: document.getElementById('linehaulHead'),
      linehaulBody: document.getElementById('linehaulBody'),
      orderMetaLabel: document.getElementById('orderMetaLabel'),
      tripMetaLabel: document.getElementById('tripMetaLabel'),
      linehaulMetaLabel: document.getElementById('linehaulMetaLabel'),
      orderActionChips: document.getElementById('orderActionChips'),
      tripActionChips: document.getElementById('tripActionChips'),
      linehaulInfoChips: document.getElementById('linehaulInfoChips'),
      homeQuickChips: document.getElementById('homeQuickChips'),
      orderSidebarList: document.getElementById('orderSidebarList'),
      tripSidebarList: document.getElementById('tripSidebarList'),
      orderActionSelect: document.getElementById('orderActionSelect'),
      tripActionSelect: document.getElementById('tripActionSelect'),
      tripActionTopSelect: document.getElementById('tripActionTopSelect')
    };

    function log(message) {
      const line = `[${new Date().toLocaleTimeString()}] ${message}`;
      state.log.unshift(line);
      state.log = state.log.slice(0, 20);
      els.activityLog.textContent = state.log.join('\n');
    }

    function setView(view) {
      state.view = view;
      document.querySelectorAll('.view').forEach((node) => node.classList.toggle('active', node.id === `view-${view}`));
      document.querySelectorAll('[data-view]').forEach((node) => {
        const active = node.dataset.view === view;
        node.classList.toggle('active', active);
      });
    }

    function renderOptions() {
      const mkChip = (pair, active, onClick) => {
        const btn = document.createElement('button');
        btn.className = `chip${active ? ' active' : ''}`;
        btn.textContent = pair[1];
        btn.onclick = onClick;
        return btn;
      };
      els.orderActionChips.innerHTML = '';
      els.orderSidebarList.innerHTML = '';
      orderActions.forEach((pair) => {
        els.orderActionChips.appendChild(mkChip(pair, state.selectedOrderAction === pair[0], () => { state.selectedOrderAction = pair[0]; syncSelects(); renderOptions(); }));
        const side = document.createElement('button');
        side.className = `sub-item${state.selectedOrderAction === pair[0] ? ' active' : ''}`;
        side.textContent = pair[1];
        side.onclick = () => { setView('orders'); state.selectedOrderAction = pair[0]; syncSelects(); renderOptions(); };
        els.orderSidebarList.appendChild(side);
      });
      els.tripActionChips.innerHTML = '';
      els.tripSidebarList.innerHTML = '';
      tripActions.forEach((pair) => {
        els.tripActionChips.appendChild(mkChip(pair, state.selectedTripAction === pair[0], () => { state.selectedTripAction = pair[0]; syncSelects(); renderOptions(); }));
        const side = document.createElement('button');
        side.className = `sub-item${state.selectedTripAction === pair[0] ? ' active' : ''}`;
        side.textContent = pair[1];
        side.onclick = () => { setView('trips'); state.selectedTripAction = pair[0]; syncSelects(); renderOptions(); };
        els.tripSidebarList.appendChild(side);
      });
      els.linehaulInfoChips.innerHTML = '';
      ['Lookup Uses POST', 'Body: linehaul_no[]', 'Grouped Results'].forEach((label, i) => {
        const chip = document.createElement('button');
        chip.className = `chip${i === 2 ? ' active' : ''}`;
        chip.textContent = label;
        els.linehaulInfoChips.appendChild(chip);
      });
      els.homeQuickChips.innerHTML = '';
      ['Order', 'Trip', 'Linehaul', 'Grouped Actions', 'Session-backed'].forEach((label, i) => {
        const chip = document.createElement('button');
        chip.className = `chip${i < 3 ? ' active' : ''}`;
        chip.textContent = label;
        els.homeQuickChips.appendChild(chip);
      });
    }

    function syncSelects() {
      const fill = (select, options, value) => {
        select.innerHTML = '';
        options.forEach(([v, label]) => {
          const opt = document.createElement('option');
          opt.value = v; opt.textContent = label; if (v === value) opt.selected = true;
          select.appendChild(opt);
        });
      };
      fill(els.orderActionSelect, orderActions, state.selectedOrderAction);
      fill(els.tripActionSelect, tripActions, state.selectedTripAction);
      fill(els.tripActionTopSelect, tripActions, state.selectedTripAction);
    }

    function statusClass(value) {
      const text = String(value || '').toLowerCase();
      if (text.includes('dispatch')) return 'status-blue';
      if (text.includes('transit')) return 'status-cyan';
      if (text.includes('deliver')) return 'status-green';
      return 'status-amber';
    }

    function toRows(payload) {
      if (Array.isArray(payload)) return payload;
      if (payload && Array.isArray(payload.files)) return payload.files;
      if (payload && Array.isArray(payload.stop_list)) return payload.stop_list;
      if (payload && Array.isArray(payload.trip_history_list)) return payload.trip_history_list;
      if (payload && typeof payload === 'object') return [payload];
      return [];
    }

    function pickColumns(rows, preferred) {
      if (!rows.length) return preferred;
      const keys = Object.keys(rows[0]).filter((k) => typeof rows[0][k] !== 'object').slice(0, 6);
      return keys.length ? keys : preferred;
    }

    function renderTable(headEl, bodyEl, rows, preferred, type = 'generic') {
      const columns = pickColumns(rows, preferred);
      headEl.innerHTML = columns.map((col) => `<th>${col.replace(/_/g, ' ')}</th>`).join('') + '<th></th>';
      bodyEl.innerHTML = rows.length ? rows.map((row) => {
        return `<tr>${columns.map((col) => {
          const val = row?.[col] ?? '';
          if (col.toLowerCase().includes('status')) return `<td><span class="status-pill ${statusClass(val)}">${val || 'Pending'}</span></td>`;
          return `<td>${String(val)}</td>`;
        }).join('')}<td>•••</td></tr>`;
      }).join('') : `<tr><td colspan="${columns.length + 1}" class="muted">No data loaded yet.</td></tr>`;
    }

    function renderSummary(data) {
      const pairs = [
        ['Active view', state.view],
        ['Order action', state.selectedOrderAction],
        ['Trip action', state.selectedTripAction],
        ['Order no', state.selectedOrderNo || '—'],
        ['Trip no', state.selectedTripNo || '—'],
        ['Linehaul nos', state.selectedLinehaulNos || '—'],
        ['Company', state.session?.companyId || '—'],
        ['Account', state.session?.account || '—']
      ];
      els.homeSummary.innerHTML = pairs.map(([k,v]) => `<div>${k}</div><div>${v}</div>`).join('');

      const raw = data ? (Array.isArray(data.data) ? `${data.data.length} row(s)` : typeof data.data) : 'No response';
      const summaryPairs = [
        ['Group', data?.group || data?.resolved?.type || '—'],
        ['Action', data?.action || '—'],
        ['Order no', data?.orderNo || data?.resolved?.orderNo || '—'],
        ['Trip no', data?.tripNo || data?.resolved?.tripNo || '—'],
        ['Linehaul', (data?.linehaulNos || []).join(', ') || data?.resolved?.lhNo || '—'],
        ['Payload', raw],
        ['Keyword', data?.keyword || '—'],
        ['Message', data?.message || 'Ready']
      ];
      els.resultSummary.innerHTML = summaryPairs.map(([k,v]) => `<div>${k}</div><div>${v}</div>`).join('');
      els.rawResponse.textContent = JSON.stringify(data || { message: 'No response yet.' }, null, 2);
    }

    async function api(path, payload = {}) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const json = await res.json();
      if (res.status === 401) {
        window.location.replace('/login.html');
        throw new Error('Session expired. Redirecting to login.');
      }
      if (!res.ok || json.ok === false) throw new Error(json.message || 'Request failed.');
      return json;
    }

    async function ensureSession() {
      const res = await fetch('/api/session');
      const json = await res.json();
      if (!json?.authenticated) {
        window.location.replace('/login.html');
        return false;
      }
      state.session = json;
      els.sessionChip.textContent = `${json.account || 'Admin User'} ▾`;
      renderSummary(state.lastResponse);
      return true;
    }

    async function runSearch() {
      const keyword = document.getElementById('globalKeyword').value.trim();
      if (!keyword) return;
      const json = await api('/api/search', { keyword });
      state.lastResponse = json;
      if (json.resolved?.orderNo) {
        state.selectedOrderNo = json.resolved.orderNo;
      }
      if (json.resolved?.tripNo) {
        state.selectedTripNo = json.resolved.tripNo;
      }
      if (json.resolved?.lhNo) {
        state.selectedLinehaulNos = String(json.resolved.lhNo);
      }
      log(`Resolved ${keyword} as ${json.resolved?.type || 'UNSUPPORTED'}.`);
      renderSummary(json);
      if (json.resolved?.type === 'ORDER') setView('orders');
      else if (json.resolved?.type === 'TRIP') setView('trips');
      else if (json.resolved?.type === 'LINEHAUL') setView('linehaul');
      syncInputs();
    }

    function syncInputs() {
      document.getElementById('orderNoInput').value = state.selectedOrderNo;
      document.getElementById('tripNoInput').value = state.selectedTripNo;
      document.getElementById('linehaulNosInput').value = state.selectedLinehaulNos;
    }

    async function runOrderAction() {
      state.selectedOrderNo = document.getElementById('orderNoInput').value.trim();
      state.selectedOrderAction = els.orderActionSelect.value;
      if (!state.selectedOrderNo) return alert('Enter an order number first.');
      const json = await api('/api/order', { action: state.selectedOrderAction, orderNo: state.selectedOrderNo });
      state.lastResponse = json;
      state.orderRows = toRows(json.data);
      renderTable(els.ordersHead, els.ordersBody, state.orderRows, ['order_no','pro_no','status_text','pickup_date','delivery_date']);
      els.orderMetaLabel.textContent = `Showing ${state.orderRows.length} result${state.orderRows.length === 1 ? '' : 's'}`;
      log(`Loaded Order ${state.selectedOrderAction} for ${state.selectedOrderNo}.`);
      renderSummary(json);
      renderOptions();
      setView('orders');
    }

    async function runTripAction() {
      state.selectedTripNo = document.getElementById('tripNoInput').value.trim();
      state.selectedTripAction = els.tripActionSelect.value;
      if (!state.selectedTripNo) return alert('Enter a trip number first.');
      const json = await api('/api/trip', { action: state.selectedTripAction, tripNo: state.selectedTripNo });
      state.lastResponse = json;
      state.tripRows = toRows(json.data);
      renderTable(els.tripsHead, els.tripsBody, state.tripRows, ['trip_no','status','driver','tractor_no','trailer_no']);
      els.tripMetaLabel.textContent = `Showing ${state.tripRows.length} result${state.tripRows.length === 1 ? '' : 's'}`;
      log(`Loaded Trip ${state.selectedTripAction} for ${state.selectedTripNo}.`);
      renderSummary(json);
      renderOptions();
      setView('trips');
    }

    async function runLinehaulAction() {
      state.selectedLinehaulNos = document.getElementById('linehaulNosInput').value.trim();
      if (!state.selectedLinehaulNos) return alert('Enter at least one linehaul number.');
      const json = await api('/api/linehaul', { linehaulNos: state.selectedLinehaulNos });
      state.lastResponse = json;
      state.linehaulRows = toRows(json.data);
      renderTable(els.linehaulHead, els.linehaulBody, state.linehaulRows, ['linehaul_no','status','org_terminal','dst_terminal']);
      els.linehaulMetaLabel.textContent = `Showing ${state.linehaulRows.length} result${state.linehaulRows.length === 1 ? '' : 's'}`;
      log(`Loaded ${json.linehaulNos.length} linehaul record(s).`);
      renderSummary(json);
      setView('linehaul');
    }

    document.querySelectorAll('[data-view]').forEach((node) => {
      node.addEventListener('click', () => setView(node.dataset.view));
    });
    document.querySelectorAll('.section-link[data-view]').forEach((node) => {
      node.addEventListener('click', () => setView(node.dataset.view));
    });

    document.getElementById('homeFindBtn').onclick = runSearch;
    document.getElementById('homeResolveBtn').onclick = runSearch;
    document.getElementById('openWorkspaceBtn').onclick = () => setView(document.getElementById('globalTarget').value === 'auto' ? state.view : document.getElementById('globalTarget').value);
    document.getElementById('orderRunBtn').onclick = runOrderAction;
    document.getElementById('orderSearchBtn').onclick = runOrderAction;
    document.getElementById('tripRunBtn').onclick = runTripAction;
    document.getElementById('tripSearchBtn').onclick = runTripAction;
    document.getElementById('linehaulRunBtn').onclick = runLinehaulAction;
    document.getElementById('linehaulSearchBtn').onclick = runLinehaulAction;
    document.getElementById('copyResultsBtn').onclick = async () => navigator.clipboard.writeText(els.rawResponse.textContent || '');
    document.getElementById('logoutBtn').onclick = async () => { await fetch('/api/logout'); window.location.replace('/login.html'); };
    els.orderActionSelect.onchange = (e) => { state.selectedOrderAction = e.target.value; renderOptions(); };
    els.tripActionSelect.onchange = (e) => { state.selectedTripAction = e.target.value; els.tripActionTopSelect.value = e.target.value; renderOptions(); };
    els.tripActionTopSelect.onchange = (e) => { state.selectedTripAction = e.target.value; els.tripActionSelect.value = e.target.value; renderOptions(); };

    (async function init() {
      const ok = await ensureSession();
      if (!ok) return;
      syncSelects();
      renderOptions();
      renderSummary(null);
      renderTable(els.ordersHead, els.ordersBody, [], ['Order No.','Shipper','Pickup City','Delivery City','Status']);
      renderTable(els.tripsHead, els.tripsBody, [], ['Trip No.','Driver','Origin','Destination','Status']);
      renderTable(els.linehaulHead, els.linehaulBody, [], ['Linehaul No.','Origin','Destination','Status']);
      els.activityLog.textContent = state.log.join('\n');
    })();
  </script>
</body>
</html>
